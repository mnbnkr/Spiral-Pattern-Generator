name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0-beta.9
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        env:
          TRUNK_VERSION: 0.21.14
          TRUNK_SHA256: f2b4680cd239693a646a2795e4633c625328d7b2a044fbe749fa3a2fe9e7036b
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            -o trunk.tar.gz
          echo "${TRUNK_SHA256}  trunk.tar.gz" | sha256sum -c -
          tar -xzf trunk.tar.gz
          mkdir -p "$HOME/.local/bin"
          install -m 0755 trunk "$HOME/.local/bin/trunk"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trunk" --version

      - name: Build static assets
        run: |
          BASE_PATH="/${GITHUB_REPOSITORY#*/}/"
          trunk build --release --public-url "$BASE_PATH"

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
