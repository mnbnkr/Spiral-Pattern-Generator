name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0-beta.9
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Trunk
        env:
          TRUNK_VERSION: 0.21.14
          TRUNK_SHA256: f2b4680cd239693a646a2795e4633c625328d7b2a044fbe749fa3a2fe9e7036b
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            -o trunk.tar.gz
          echo "${TRUNK_SHA256}  trunk.tar.gz" | sha256sum -c -
          tar -xzf trunk.tar.gz
          mkdir -p "$HOME/.local/bin"
          install -m 0755 trunk "$HOME/.local/bin/trunk"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trunk" --version
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Rust tests
        run: cargo test
      - name: Run host clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run WASM clippy
        run: cargo clippy --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Build Web App
        run: trunk build
      - name: Create Test Directories
        run: mkdir -p target/playwright/test-results target/playwright/report
      - name: Run Playwright tests
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: target/playwright/report/
          retention-days: 30
