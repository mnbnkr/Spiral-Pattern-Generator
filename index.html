<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base data-trunk-public-url />
    <title>Spiral Pattern Generator</title>
    <link data-trunk rel="css" href="styles.css" />
    <link data-trunk rel="rust" data-bin="spg_app" />
    <link
      data-trunk
      rel="rust"
      data-bin="spg_worker"
      data-type="worker"
      data-loader-shim
    />
  </head>
  <body>
    <canvas id="sim-canvas" aria-label="Spiral pattern canvas"></canvas>
    <aside id="control-panel" class="panel">
      <header class="panel-header">
        <div class="title-row">
          <h1>Spiral Pattern Generator</h1>
          <button
            id="panel-toggle-button"
            class="small-header-button"
            type="button"
            title="Collapse controls"
          >
            Hide
          </button>
        </div>
        <div id="status-line">Idle</div>
      </header>

      <div class="panel-body">
        <section class="control-section">
          <div class="two-column-row separated-row render-settings-row">
            <label for="board-select"
              ><span class="label-row"
                >Board Type
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Choose the coordinate system used by the worker: triangle, square, axial hex, or exact continuous Archimedean spots."
                  >i</span
                ></span
              >
              <select id="board-select">
                <option value="LatticeTriangle">Triangle Lattice</option>
                <option value="LatticeSquare" selected>Square Lattice</option>
                <option value="LatticeHex">Hex Lattice</option>
                <option value="ContinuousArchimedean">Continuous Spiral</option>
              </select>
            </label>

            <label for="shape-select"
              ><span class="label-row"
                >Piece Shape
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Render-only on lattice boards. Continuous bodies stay circular because their collision and attack math is circle-based."
                  >i</span
                ></span
              >
              <select id="shape-select">
                <option id="shape-option-square" value="Square">Square</option>
                <option value="Circle">Circle</option>
                <option id="shape-option-hex" value="Hex">Hex</option>
                <option id="shape-option-triangle" value="Triangle" disabled>
                  Triangle
                </option>
              </select>
            </label>
          </div>
        </section>

        <section class="control-section">
          <div class="two-column-row separated-row radius-settings-row">
            <label for="radius-input"
              ><span class="label-row"
                >View / Generation Radius
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Radius controls both Fit Screen bounds and where the worker stops generating. Edits preview immediately and commit after a short delay."
                  >i</span
                ></span
              >
              <input
                id="radius-input"
                type="text"
                value="200"
                inputmode="decimal"
                autocomplete="off"
              />
            </label>
            <label for="piece-radius-slider"
              ><span class="label-row"
                >Piece Radius <output id="piece-radius-output">0.50</output>
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="On lattice boards this only changes rendering. On the continuous board it changes physical body overlap and attack hits, so generation resets."
                  >i</span
                ></span
              >
              <input
                id="piece-radius-slider"
                type="range"
                min="0.05"
                max="0.50"
                step="0.01"
                value="0.50"
              />
            </label>
          </div>

          <div class="inline-setting-row">
            <label for="speed-slider"
              ><span class="label-row"
                >Speed <output id="speed-output">250/s</output>
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Fastest uses bounded worker batches. Slower rates are useful when inspecting exact placement order."
                  >i</span
                ></span
              >
              <input
                id="speed-slider"
                type="range"
                min="1"
                max="1000"
                step="1"
                value="250"
              />
            </label>
            <label class="inline-control" for="fastest-toggle">
              <input id="fastest-toggle" type="checkbox" checked />
              Fastest
            </label>
          </div>
        </section>

        <section class="control-section">
          <div class="two-column-row separated-row display-settings-row">
            <div class="stacked-display-controls">
              <label for="display-mode-select"
                ><span class="label-row"
                  >Display Mode
                  <span
                    class="info-icon"
                    tabindex="0"
                    data-tip="Fit Screen locks the view to Radius. Free Camera enables panning and wheel zoom around the cursor."
                    >i</span
                  ></span
                >
                <select id="display-mode-select">
                  <option value="FitScreen">Fit Screen</option>
                  <option value="PixelOneToOne">Free Camera</option>
                </select>
              </label>
              <label
                class="inline-control visual-progress"
                for="visual-progress-toggle"
              >
                <input id="visual-progress-toggle" type="checkbox" checked />
                Visual Progress
              </label>
            </div>

            <div class="stacked-render-sliders">
              <label for="track-opacity-slider"
                ><span class="label-row"
                  >Spiral Track <output id="track-opacity-output">10%</output>
                  <span
                    class="info-icon"
                    tabindex="0"
                    data-tip="Draws the board's underlying spiral path behind pieces. This is render-only and does not reset the worker."
                    >i</span
                  ></span
                >
                <input
                  id="track-opacity-slider"
                  type="range"
                  min="0"
                  max="100"
                  step="1"
                  value="10"
                />
              </label>
              <label for="attack-overlay-opacity-slider"
                ><span class="label-row"
                  >Attack Spots
                  <output id="attack-overlay-opacity-output">Off</output>
                  <span
                    class="info-icon"
                    tabindex="0"
                    data-tip="Draws placed pieces' attack spots, proactive attack-rule shadows, or continuous attack circles. This is visual only and can be slower on dense high-radius runs."
                    >i</span
                  ></span
                >
                <input
                  id="attack-overlay-opacity-slider"
                  type="range"
                  min="0"
                  max="100"
                  step="1"
                  value="0"
                />
              </label>
            </div>
          </div>
        </section>

        <section class="control-section">
          <div class="two-column-row separated-row search-enemy-row">
            <label for="enemy-mode-select"
              ><span class="label-row"
                >Ally / Enemy Condition
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Attack-set treats different normalized attack jumps as enemies. Color treats different color groups as enemies. Color-Attack-set applies both. Free for All treats every piece as unique."
                  >i</span
                ></span
              >
              <select id="enemy-mode-select">
                <option value="AttackSet">Attack-set</option>
                <option value="Color" selected>Color</option>
                <option value="ColorAttackSet">Color-Attack-set</option>
                <option value="FreeForAll">Free for All</option>
              </select>
            </label>

            <label for="placement-search-select"
              ><span class="label-row"
                >Placement Search
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Spiral Path follows the current path position. Center Distance picks the valid spot closest to the spiral center."
                  >i</span
                ></span
              >
              <select id="placement-search-select">
                <option value="SpiralPath" selected>Spiral Path</option>
                <option value="CenterDistance">Center Distance</option>
              </select>
            </label>
          </div>

          <div class="two-column-row separated-row attack-offset-row">
            <label class="checkbox-pair" for="attacking-toggle">
              <span class="label-row"
                >Proactive Attack Rule
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="When enabled, a candidate is rejected if it would attack an existing enemy piece. Status shows active rejection counts."
                  >i</span
                ></span
              >
              <span class="inline-control">
                <input id="attacking-toggle" type="checkbox" />
                Enabled
              </span>
            </label>

            <label id="continuous-offset-group" for="continuous-offset-input"
              ><span class="label-row"
                >Continuous Offset
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Initial arc-length offset from the origin. Valid values are 0..1 with up to 12 decimal places; more precision is below the solver tolerance."
                  >i</span
                ></span
              >
              <span id="continuous-offset-input-wrap" class="offset-input-wrap">
                <input
                  id="continuous-offset-input"
                  type="text"
                  inputmode="decimal"
                  autocomplete="off"
                  value="0"
                />
                <span
                  id="continuous-offset-highlight"
                  class="offset-input-highlight"
                  aria-hidden="true"
                ></span>
              </span>
            </label>
          </div>
        </section>

        <section class="control-section">
          <div id="preset-move-row" class="preset-move-row custom-finite">
            <label id="piece-a-label" for="piece-a-input">
              First Move
              <input id="piece-a-input" type="number" step="1" value="2" />
            </label>
            <label id="piece-b-label" for="piece-b-input">
              Turn Move
              <input id="piece-b-input" type="number" step="1" value="1" />
            </label>
            <span id="preset-move-divider" class="row-divider" aria-hidden="true"></span>
            <label for="army-preset-select"
              ><span class="label-row"
                >Army Preset
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Piece preset. Custom Finite cycles rows, and each row remembers its own search cursor. Prime presets keep one current prime piece until it finds a valid spot."
                  >i</span
                ></span
              >
              <select id="army-preset-select">
                <option value="CustomFinite">Custom Finite</option>
                <option value="PrimeKnight">Prime Knight</option>
                <option value="PrimeGapper">Prime Gapper</option>
              </select>
            </label>
          </div>

          <div id="custom-army-editor">
            <div class="piece-action-row">
              <button id="add-piece-button" type="button">
                <span>Add</span>
                <span
                  class="info-icon button-info"
                  data-tip="Adds the First/Turn move as a new custom row. Drag rows to reorder; drag or click a color swatch to keep that visible color fixed."
                  >i</span
                >
              </button>
              <span class="piece-action-divider" aria-hidden="true"></span>
              <button id="random-piece-button" type="button">
                <span>Random</span>
                <span
                  class="info-icon button-info"
                  data-tip="Replaces the custom army with the requested count sampled from the editable random pool. The pencil button edits that pool without changing the current army."
                  >i</span
                >
              </button>
              <input
                id="random-count-input"
                type="number"
                min="0"
                step="1"
                value="3"
                title="Random piece count"
                aria-label="Random piece count"
              />
              <button
                id="random-pool-toggle-button"
                class="square-icon-button"
                type="button"
                title="Edit random pool"
                aria-pressed="false"
              >
                <span class="mirrored-icon" aria-hidden="true">&#9998;</span>
              </button>
            </div>
            <div id="army-list" class="army-list"></div>
          </div>

          <div id="prime-color-controls">
            <label
              id="prime-divisor-label"
              class="inline-setting-row"
              for="prime-divisor-input"
              ><span class="label-row"
                >Modulo Divisor (colors)
                <span
                  class="info-icon"
                  tabindex="0"
                  data-tip="Prime Knight colors bounce through modulo buckets between Anchor A and Anchor B. Values commit on Enter or blur, then normalize to the nearest multiple of 6."
                  >i</span
                ></span
              >
              <input
                id="prime-divisor-input"
                type="number"
                min="6"
                step="6"
                value="12"
              />
            </label>
            <div class="anchor-row">
              <div class="color-setting">
                <span id="anchor-a-label" class="label-row"
                  >Start Color
                  <span
                    class="info-icon"
                    tabindex="0"
                    data-tip="First custom row and low prime color values use this anchor."
                    >i</span
                  ></span
                >
                <input
                  id="anchor-a-input"
                  type="color"
                  value="#ff7800"
                  aria-labelledby="anchor-a-label"
                />
              </div>
              <div class="color-setting">
                <span id="anchor-b-label" class="label-row"
                  >End Color
                  <span
                    class="info-icon"
                    tabindex="0"
                    data-tip="Last custom row and high prime-gap values use this anchor. Intermediate colors follow a hue path."
                    >i</span
                  ></span
                >
                <input
                  id="anchor-b-input"
                  type="color"
                  value="#ff0006"
                  aria-labelledby="anchor-b-label"
                />
              </div>
            </div>
          </div>
        </section>

        <section class="button-row run-button-row">
          <button id="start-button" type="button">Start</button>
          <button id="pause-button" type="button">Pause</button>
          <button id="step-button" type="button">Step</button>
          <span class="button-row-divider" aria-hidden="true"></span>
          <button id="refresh-button" type="button">Refresh</button>
        </section>

        <section class="button-row export-button-row">
          <button id="download-full-png-button" type="button">Full PNG</button>
          <button id="download-png-button" type="button">PNG</button>
          <span class="button-row-divider" aria-hidden="true"></span>
          <button id="settings-export-button" type="button">Export &#9881;&#xfe0e;</button>
          <button id="settings-import-button" type="button">Import &#9881;&#xfe0e;</button>
          <input
            id="settings-import-input"
            class="visually-hidden-file-input"
            type="file"
            accept="application/json,.json"
            aria-hidden="true"
            tabindex="-1"
          />
        </section>

        <section class="control-section log-section">
          <label for="placement-log">Placement Log</label>
          <pre id="placement-log">No placements yet.</pre>
        </section>
      </div>
    </aside>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const tooltip = document.createElement("div");
        tooltip.className = "global-tooltip";
        document.body.appendChild(tooltip);
        let tooltipTimer = 0;

        const cancelTooltipTimer = () => {
          if (tooltipTimer) {
            window.clearTimeout(tooltipTimer);
            tooltipTimer = 0;
          }
        };

        document.querySelectorAll(".info-icon").forEach((icon) => {
          icon.addEventListener("mousedown", (event) => {
            event.preventDefault();
            event.stopPropagation();
            cancelTooltipTimer();
            tooltip.classList.remove("visible");
          });
          icon.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            cancelTooltipTimer();
            tooltip.classList.remove("visible");
          });

          const show = () => {
            tooltip.textContent = icon.getAttribute("data-tip");
            tooltip.classList.add("visible");
            const rect = icon.getBoundingClientRect();
            let left = rect.left + rect.width / 2;
            let top = rect.top - 8;

            const tooltipWidth = Math.min(270, window.innerWidth - 64);
            const halfWidth = tooltipWidth / 2;
            if (left - halfWidth < 16) {
              left = halfWidth + 16;
            }
            if (left + halfWidth > window.innerWidth - 16) {
              left = window.innerWidth - halfWidth - 16;
            }

            tooltip.style.left = `${left}px`;
            tooltip.style.top = `${top}px`;
          };
          const scheduleShow = () => {
            cancelTooltipTimer();
            tooltipTimer = window.setTimeout(() => {
              tooltipTimer = 0;
              show();
            }, 400);
          };
          const hide = () => {
            cancelTooltipTimer();
            tooltip.classList.remove("visible");
          };

          icon.addEventListener("mouseenter", scheduleShow);
          icon.addEventListener("mouseleave", hide);
          icon.addEventListener("focus", scheduleShow);
          icon.addEventListener("blur", hide);
        });

        document
          .querySelectorAll(".panel, .panel-body")
          .forEach((scrollRoot) => {
            scrollRoot.addEventListener("scroll", () => {
              cancelTooltipTimer();
              tooltip.classList.remove("visible");
            });
          });
      });
    </script>
  </body>
</html>
